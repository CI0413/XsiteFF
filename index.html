<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSV Family Feud</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --dsv-blue: #002664;
    --dsv-blue-mid: #0A34A1;
    --dsv-blue-light: #4B87E0;
    --dsv-orange: #C64801;
    --dsv-yellow: #FFCA0C;
    --dsv-green: #00682A;
    --dsv-white: #FFFFFF;
    --dsv-black: #000000;
    --dsv-grey-dark: #2F3135;
    --dsv-grey-mid: #646768;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Barlow', sans-serif;
    background: var(--dsv-blue);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── BACKGROUND PATTERN ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 50% -20%, rgba(75,135,224,0.18) 0%, transparent 70%),
      repeating-linear-gradient(
        -45deg,
        rgba(255,255,255,0.015) 0px,
        rgba(255,255,255,0.015) 1px,
        transparent 1px,
        transparent 40px
      );
    pointer-events: none;
    z-index: 0;
  }

  .wrapper { position: relative; z-index: 1; }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 40px;
    background: rgba(0,0,0,0.4);
    border-bottom: 3px solid var(--dsv-yellow);
    backdrop-filter: blur(6px);
  }
  .logo-mark {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.2rem;
    letter-spacing: 2px;
    color: var(--dsv-white);
  }
  .logo-mark span { color: var(--dsv-yellow); }
  .game-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3rem;
    color: var(--dsv-yellow);
    letter-spacing: 6px;
    text-shadow: 0 0 30px rgba(255,202,12,0.5);
  }
  .round-badge {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    color: var(--dsv-yellow);
    border: 2px solid var(--dsv-yellow);
    padding: 6px 16px;
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0.9;
  }

  /* ── SCOREBOARD ── */
  .scoreboard {
    display: flex;
    justify-content: center;
    gap: 40px;
    padding: 20px 40px;
    background: rgba(0,0,0,0.25);
  }
  .team-score {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .team-name-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.6);
  }
  .team-name-input {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 2px;
    color: var(--dsv-white);
    background: transparent;
    border: none;
    border-bottom: 2px solid rgba(255,255,255,0.3);
    text-align: center;
    width: 160px;
    outline: none;
    transition: border-color 0.2s;
  }
  .team-name-input:focus { border-color: var(--dsv-yellow); }
  .score-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3.5rem;
    line-height: 1;
    color: var(--dsv-yellow);
    text-shadow: 0 0 20px rgba(255,202,12,0.4);
    transition: transform 0.2s;
  }
  .score-value.bump { transform: scale(1.3); }
  .vs-divider {
    display: flex;
    align-items: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem;
    color: rgba(255,255,255,0.3);
    letter-spacing: 2px;
    padding-top: 28px;
  }

  /* ── MAIN GAME AREA ── */
  main { padding: 30px 40px; }

  /* ── QUESTION AREA ── */
  .question-box {
    background: linear-gradient(135deg, rgba(10,52,161,0.7) 0%, rgba(0,38,100,0.9) 100%);
    border: 2px solid rgba(75,135,224,0.4);
    border-radius: 4px;
    padding: 24px 36px;
    margin-bottom: 30px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .question-box::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--dsv-yellow), var(--dsv-orange), var(--dsv-yellow));
  }
  .question-number {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 0.8rem;
    letter-spacing: 4px;
    color: var(--dsv-yellow);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .question-text {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 1.8rem;
    color: var(--dsv-white);
    line-height: 1.3;
  }

  /* ── ANSWER BOARD ── */
  .answer-board {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 28px;
  }
  .answer-tile {
    background: rgba(0,0,0,0.5);
    border: 2px solid rgba(75,135,224,0.25);
    border-radius: 4px;
    padding: 0;
    height: 72px;
    display: flex;
    align-items: center;
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .answer-tile:hover:not(.revealed) {
    border-color: rgba(255,202,12,0.4);
    box-shadow: 0 0 16px rgba(255,202,12,0.1);
  }
  .answer-tile.revealed {
    border-color: var(--dsv-yellow);
    background: linear-gradient(135deg, rgba(10,52,161,0.8), rgba(0,38,100,0.95));
    cursor: default;
    animation: flipReveal 0.5s ease forwards;
  }
  @keyframes flipReveal {
    0%   { transform: rotateX(90deg); opacity: 0; }
    100% { transform: rotateX(0deg); opacity: 1; }
  }

  .tile-number {
    width: 56px;
    min-width: 56px;
    height: 100%;
    background: var(--dsv-blue-mid);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    color: rgba(255,255,255,0.5);
    border-right: 2px solid rgba(75,135,224,0.25);
    transition: background 0.3s, color 0.3s;
  }
  .revealed .tile-number {
    background: var(--dsv-yellow);
    color: var(--dsv-blue);
  }
  .tile-text {
    flex: 1;
    padding: 0 20px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 1.15rem;
    color: var(--dsv-white);
    opacity: 0;
    transition: opacity 0.3s 0.2s;
    line-height: 1.2;
  }
  .revealed .tile-text { opacity: 1; }
  .tile-hidden-text {
    flex: 1;
    padding: 0 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
  }
  .revealed .tile-hidden-text { display: none; }

  /* ── STRIKES ── */
  .strikes-bar {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 16px;
    margin-bottom: 28px;
  }
  .strikes-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    letter-spacing: 3px;
    font-size: 0.85rem;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
  }
  .strike-circle {
    width: 44px; height: 44px;
    border-radius: 50%;
    border: 3px solid rgba(198,72,1,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem;
    color: rgba(198,72,1,0.3);
    transition: all 0.3s;
  }
  .strike-circle.active {
    border-color: var(--dsv-orange);
    color: var(--dsv-orange);
    background: rgba(198,72,1,0.15);
    box-shadow: 0 0 20px rgba(198,72,1,0.4);
    animation: strikeShake 0.4s ease;
  }
  @keyframes strikeShake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-6px); }
    80% { transform: translateX(6px); }
  }

  /* ── STEAL BANNER ── */
  .steal-banner {
    display: none;
    background: linear-gradient(135deg, var(--dsv-orange), #E14200);
    border-radius: 4px;
    padding: 16px 28px;
    text-align: center;
    margin-bottom: 20px;
    animation: pulse 1.5s infinite;
  }
  .steal-banner.visible { display: block; }
  @keyframes pulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.75; }
  }
  .steal-banner-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 4px;
    color: var(--dsv-white);
  }
  .steal-team-name { color: var(--dsv-yellow); }

  /* ── POT ── */
  .pot-display {
    display: flex;
    justify-content: center;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 24px;
  }
  .pot-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
  }
  .pot-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.8rem;
    color: var(--dsv-yellow);
    text-shadow: 0 0 20px rgba(255,202,12,0.5);
    transition: transform 0.2s;
  }
  .pot-unit {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 1rem;
    color: rgba(255,202,12,0.6);
    letter-spacing: 1px;
  }

  /* ── CONTROL BUTTONS ── */
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    justify-content: center;
    margin-bottom: 24px;
  }
  .btn {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 13px 28px;
    border: none;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn:hover { transform: translateY(-2px); }
  .btn:active { transform: translateY(0); }

  .btn-primary {
    background: var(--dsv-yellow);
    color: var(--dsv-blue);
  }
  .btn-primary:hover { box-shadow: 0 6px 24px rgba(255,202,12,0.4); }

  .btn-danger {
    background: var(--dsv-orange);
    color: var(--dsv-white);
  }
  .btn-danger:hover { box-shadow: 0 6px 24px rgba(198,72,1,0.4); }

  .btn-success {
    background: var(--dsv-green);
    color: var(--dsv-white);
  }
  .btn-success:hover { box-shadow: 0 6px 24px rgba(0,104,42,0.4); }

  .btn-outline {
    background: transparent;
    color: var(--dsv-white);
    border: 2px solid rgba(255,255,255,0.3);
  }
  .btn-outline:hover {
    border-color: var(--dsv-white);
    box-shadow: 0 4px 16px rgba(255,255,255,0.1);
  }

  .btn-nav {
    background: var(--dsv-blue-mid);
    color: var(--dsv-white);
  }
  .btn-nav:hover { box-shadow: 0 4px 16px rgba(10,52,161,0.4); }

  /* ── ACTIVE TEAM INDICATOR ── */
  .active-team-bar {
    text-align: center;
    margin-bottom: 16px;
  }
  .active-team-text {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.6);
  }
  .active-team-name {
    color: var(--dsv-yellow);
    font-size: 1.2rem;
  }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    top: 90px;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: rgba(0,0,0,0.9);
    border: 2px solid var(--dsv-yellow);
    color: var(--dsv-white);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 1.1rem;
    letter-spacing: 1px;
    padding: 14px 32px;
    border-radius: 4px;
    opacity: 0;
    transition: all 0.35s;
    z-index: 100;
    pointer-events: none;
    text-align: center;
    max-width: 500px;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ── WINNER OVERLAY ── */
  .winner-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 200;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    text-align: center;
  }
  .winner-overlay.visible { display: flex; }
  .winner-content {
    background: linear-gradient(135deg, var(--dsv-blue), var(--dsv-blue-mid));
    border: 3px solid var(--dsv-yellow);
    border-radius: 8px;
    padding: 60px 80px;
    animation: winEntrance 0.6s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes winEntrance {
    0% { transform: scale(0.5) rotate(-3deg); opacity: 0; }
    100% { transform: scale(1) rotate(0); opacity: 1; }
  }
  .winner-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: 6px;
    color: var(--dsv-yellow);
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .winner-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 5rem;
    color: var(--dsv-white);
    letter-spacing: 4px;
    margin-bottom: 4px;
  }
  .winner-score {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    color: var(--dsv-yellow);
    letter-spacing: 2px;
    margin-bottom: 32px;
  }
  .confetti-row {
    font-size: 2.5rem;
    margin-bottom: 32px;
    animation: sway 2s ease-in-out infinite;
  }
  @keyframes sway {
    0%,100% { letter-spacing: 8px; }
    50% { letter-spacing: 16px; }
  }

  /* ── ROUND NAV ── */
  .round-nav {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 20px;
  }
  .round-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    border: 2px solid rgba(255,255,255,0.2);
    cursor: pointer;
    transition: all 0.2s;
  }
  .round-dot.active {
    background: var(--dsv-yellow);
    border-color: var(--dsv-yellow);
    box-shadow: 0 0 10px rgba(255,202,12,0.5);
  }
  .round-dot.done {
    background: rgba(0,104,42,0.6);
    border-color: var(--dsv-green);
  }

  /* ── FOOTER ── */
  footer {
    text-align: center;
    padding: 16px;
    font-family: 'Barlow', sans-serif;
    font-size: 0.75rem;
    color: rgba(255,255,255,0.2);
    letter-spacing: 2px;
  }
</style>
</head>
<body>
<div class="wrapper">

  <header>
    <div class="logo-mark">DSV <span>·</span> GLOBAL</div>
    <div class="game-title">Family Feud</div>
    <div class="round-badge" id="roundLabel">Round 1 of 5</div>
  </header>

  <div class="scoreboard">
    <div class="team-score" id="team1Section">
      <div class="team-name-label">Team 1</div>
      <input class="team-name-input" id="team1Name" value="BLUE HAWKS" maxlength="14">
      <div class="score-value" id="score1">0</div>
    </div>
    <div class="vs-divider">VS</div>
    <div class="team-score" id="team2Section">
      <div class="team-name-label">Team 2</div>
      <input class="team-name-input" id="team2Name" value="RED FOXES" maxlength="14">
      <div class="score-value" id="score2">0</div>
    </div>
  </div>

  <main>
    <div class="round-nav" id="roundNav"></div>

    <div class="active-team-bar">
      <span class="active-team-text">Active Team: <span class="active-team-name" id="activeTeamDisplay">BLUE HAWKS</span></span>
    </div>

    <div class="question-box">
      <div class="question-number" id="questionNumber">Question 1</div>
      <div class="question-text" id="questionText">Loading question...</div>
    </div>

    <div class="answer-board" id="answerBoard"></div>

    <div class="pot-display">
      <span class="pot-label">Round Pot</span>
      <span class="pot-value" id="potValue">0</span>
      <span class="pot-unit">pts</span>
    </div>

    <div class="strikes-bar">
      <span class="strikes-label">Strikes</span>
      <div class="strike-circle" id="s1">✕</div>
      <div class="strike-circle" id="s2">✕</div>
      <div class="strike-circle" id="s3">✕</div>
    </div>

    <div class="steal-banner" id="stealBanner">
      <div class="steal-banner-text">⚡ STEAL CHANCE — <span class="steal-team-name" id="stealTeamName">RED FOXES</span> — ONE ANSWER!</div>
    </div>

    <div class="controls">
      <button class="btn btn-danger" onclick="addStrike()">➕ Strike</button>
      <button class="btn btn-success" onclick="awardPoints(1)">🏆 Award to Team 1</button>
      <button class="btn btn-success" onclick="awardPoints(2)">🏆 Award to Team 2</button>
      <button class="btn btn-outline" onclick="switchTeam()">🔄 Switch Team</button>
    </div>
    <div class="controls">
      <button class="btn btn-nav" onclick="prevRound()">← Prev Round</button>
      <button class="btn btn-primary" onclick="revealAll()">👁 Reveal All</button>
      <button class="btn btn-nav" onclick="nextRound()">Next Round →</button>
    </div>
    <div class="controls">
      <button class="btn btn-outline" onclick="resetGame()">↺ New Game</button>
    </div>
  </main>

  <footer>DSV GLOBAL TRANSPORT AND LOGISTICS · VENDOR MANAGEMENT TRAINING</footer>
</div>

<!-- Winner overlay -->
<div class="winner-overlay" id="winnerOverlay">
  <div class="winner-content">
    <div class="winner-label">🎉 WINNER!</div>
    <div class="confetti-row">🏆 🎊 🏆</div>
    <div class="winner-name" id="winnerName">TEAM</div>
    <div class="winner-score" id="winnerScore">0 POINTS</div>
    <button class="btn btn-primary" onclick="document.getElementById('winnerOverlay').classList.remove('visible')">Continue Playing</button>
    &nbsp;
    <button class="btn btn-outline" onclick="resetGame()">New Game</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const ROUNDS = [
  {
    question: "Name something a service provider must have to work inside a DSV facility.",
    answers: [
      "Register at the lobby",
      "Receive an official badge / ID",
      "Receive safety instructions",
      "Name the contact person"
    ]
  },
  {
    question: "Name something that must be in place before employees can use a vendor.",
    answers: [
      "Signed contracts",
      "A DSV code of conduct",
      "Contract in an approved shared folder",
      "Renewal tracking process"
    ]
  },
  {
    question: "Name something site management needs to keep track of all vendors.",
    answers: [
      "Every equipment has a named maintenance vendor",
      "Preventive Maintenance Schedule",
      "Service reports",
      "Signed security requirements"
    ]
  },
  {
    question: "Name something needed to evaluate a vendor's performance.",
    answers: [
      "Reviews scheduled at appropriate interval",
      "KPIs defined",
      "Documented minutes and action items",
      "Improvement plans if needed"
    ]
  },
  {
    question: "Name something that could make a site non-compliant when a vendor visits.",
    answers: [
      "Contractors not working with a badge",
      "No registration / no signed briefing",
      "Hot work done without a permit",
      "Providers left unsupervised"
    ]
  }
];

let currentRound = 0;
let scores = [0, 0];
let strikes = 0;
let pot = 0;
let activeTeam = 0; // 0 = team1, 1 = team2
let stealMode = false;
let revealed = [];
let roundDone = new Array(ROUNDS.length).fill(false);

function getTeamName(idx) {
  return idx === 0
    ? (document.getElementById('team1Name').value || 'Team 1')
    : (document.getElementById('team2Name').value || 'Team 2');
}

function showToast(msg, duration = 2800) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

function updateActiveTeamDisplay() {
  document.getElementById('activeTeamDisplay').textContent = getTeamName(activeTeam).toUpperCase();
}

function buildRoundNav() {
  const nav = document.getElementById('roundNav');
  nav.innerHTML = '';
  ROUNDS.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'round-dot' + (i === currentRound ? ' active' : '') + (roundDone[i] ? ' done' : '');
    dot.title = `Round ${i + 1}`;
    dot.onclick = () => goToRound(i);
    nav.appendChild(dot);
  });
}

function loadRound(idx) {
  currentRound = idx;
  const r = ROUNDS[idx];
  strikes = 0;
  pot = 0;
  stealMode = false;
  revealed = new Array(r.answers.length).fill(false);

  document.getElementById('questionNumber').textContent = `Question ${idx + 1}`;
  document.getElementById('questionText').textContent = r.question;
  document.getElementById('roundLabel').textContent = `Round ${idx + 1} of ${ROUNDS.length}`;
  document.getElementById('potValue').textContent = '0';
  document.getElementById('stealBanner').classList.remove('visible');

  // Reset strikes
  ['s1','s2','s3'].forEach(id => document.getElementById(id).classList.remove('active'));

  // Build answer board
  const board = document.getElementById('answerBoard');
  board.innerHTML = '';
  r.answers.forEach((ans, i) => {
    const tile = document.createElement('div');
    tile.className = 'answer-tile';
    tile.id = `tile${i}`;
    tile.onclick = () => revealTile(i);
    tile.innerHTML = `
      <div class="tile-number">${i + 1}</div>
      <div class="tile-hidden-text">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>
      <div class="tile-text">${ans}</div>
    `;
    board.appendChild(tile);
  });

  buildRoundNav();
  updateActiveTeamDisplay();
  updateScores();
}

function revealTile(i) {
  if (revealed[i]) return;
  revealed[i] = true;
  const tile = document.getElementById(`tile${i}`);
  tile.classList.add('revealed');

  // Points: each answer = 10 pts
  pot += 10;
  document.getElementById('potValue').textContent = pot;
  animatePot();

  const allDone = revealed.every(v => v);
  if (allDone) showToast('All answers revealed! Award the points!', 3000);
}

function revealAll() {
  ROUNDS[currentRound].answers.forEach((_, i) => {
    if (!revealed[i]) setTimeout(() => revealTile(i), i * 200);
  });
}

function addStrike() {
  if (strikes >= 3) return;
  strikes++;
  document.getElementById(`s${strikes}`).classList.add('active');

  if (strikes === 3) {
    stealMode = true;
    const other = activeTeam === 0 ? 1 : 0;
    document.getElementById('stealBanner').classList.add('visible');
    document.getElementById('stealTeamName').textContent = getTeamName(other).toUpperCase();
    showToast(`3 Strikes! ${getTeamName(other)} gets a steal attempt!`, 3500);
  } else {
    showToast(`Strike ${strikes}! ${3 - strikes} remaining.`);
  }
}

function switchTeam() {
  activeTeam = activeTeam === 0 ? 1 : 0;
  stealMode = false;
  document.getElementById('stealBanner').classList.remove('visible');
  updateActiveTeamDisplay();
  showToast(`Control passed to ${getTeamName(activeTeam)}`);
}

function awardPoints(teamNum) {
  const idx = teamNum - 1;
  scores[idx] += pot;
  const el = document.getElementById(`score${teamNum}`);
  el.textContent = scores[idx];
  el.classList.add('bump');
  setTimeout(() => el.classList.remove('bump'), 300);

  showToast(`${getTeamName(idx)} earns ${pot} points! Total: ${scores[idx]}`, 3000);
  pot = 0;
  document.getElementById('potValue').textContent = '0';
  roundDone[currentRound] = true;
  buildRoundNav();

  revealAll();

  // Check winner after last round
  if (roundDone.every(v => v)) {
    setTimeout(showWinner, 1200);
  }
}

function showWinner() {
  const winIdx = scores[0] >= scores[1] ? 0 : 1;
  document.getElementById('winnerName').textContent = getTeamName(winIdx).toUpperCase();
  document.getElementById('winnerScore').textContent = `${scores[winIdx]} POINTS`;
  document.getElementById('winnerOverlay').classList.add('visible');
}

function nextRound() {
  if (currentRound < ROUNDS.length - 1) {
    activeTeam = activeTeam === 0 ? 1 : 0; // alternate who starts
    loadRound(currentRound + 1);
  } else {
    showToast('This is the last round!');
  }
}

function prevRound() {
  if (currentRound > 0) loadRound(currentRound - 1);
  else showToast('This is the first round!');
}

function goToRound(idx) { loadRound(idx); }

function animatePot() {
  const el = document.getElementById('potValue');
  el.style.transform = 'scale(1.2)';
  setTimeout(() => el.style.transform = 'scale(1)', 200);
}

function updateScores() {
  document.getElementById('score1').textContent = scores[0];
  document.getElementById('score2').textContent = scores[1];
}

function resetGame() {
  scores = [0, 0];
  roundDone = new Array(ROUNDS.length).fill(false);
  activeTeam = 0;
  document.getElementById('winnerOverlay').classList.remove('visible');
  loadRound(0);
  updateScores();
  showToast('New game started! Good luck!');
}

// Team name changes update display
document.getElementById('team1Name').addEventListener('input', updateActiveTeamDisplay);
document.getElementById('team2Name').addEventListener('input', updateActiveTeamDisplay);

// Init
loadRound(0);
</script>
</body>
</html>
